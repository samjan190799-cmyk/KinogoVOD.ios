name: KinogoVOD
options:
  bundleIdPrefix: com.samvel.kinogovod
targets:
  KinogoVOD:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Sources
    info:
      path: Sources/Info.plist
      properties:
        CFBundleName: KinogoVOD
        CFBundleDisplayName: Kinogo VOD
        CFBundleIdentifier: com.samvel.kinogovod.KinogoVOD
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        CFBundlePackageType: APPL
        CFBundleExecutable: KinogoVOD
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    settings:
      base:
        SWIFT_VERSION: "5.9"
        PRODUCT_NAME: KinogoVOD
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
        GENERATE_INFOPLIST_FILE: "NO"
