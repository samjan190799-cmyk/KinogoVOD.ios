name: Build KinogoVOD iOS IPA

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Unsigned IPA for AltStore
    runs-on: macos-14

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Cache Homebrew
        id: cache-homebrew
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /opt/homebrew/Cellar
            /opt/homebrew/bin/xcodegen
          key: ${{ runner.os }}-homebrew-xcodegen

      - name: Install XcodeGen
        if: steps.cache-homebrew.outputs.cache-hit != 'true'
        run: |
          brew update
          brew install xcodegen

      - name: Select Latest Xcode
        run: |
          LATEST_XCODE=$(ls -d /Applications/Xcode_*.app | sort -V | tail -n 1)
          echo "Using: $LATEST_XCODE"
          sudo xcode-select -s "$LATEST_XCODE/Contents/Developer"
          xcodebuild -version

      - name: Generate Xcode Project
        run: |
          xcodegen generate

      - name: Build for iOS Device (unsigned)
        run: |
          set -o pipefail
          xcodebuild \
            -project KinogoVOD.xcodeproj \
            -scheme KinogoVOD \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            VALIDATE_PRODUCT=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            SWIFT_OPTIMIZATION_LEVEL="-O" \
            build 2>&1 | xcpretty

          # Verify .app executable was built
          ls -l build/Build/Products/Release-iphoneos/KinogoVOD.app/KinogoVOD

      - name: Package as IPA
        run: |
          mkdir -p build/Payload
          APP_PATH=$(find build/Build/Products/Release-iphoneos -name "*.app" | head -1)
          echo "App path: $APP_PATH"
          cp -r "$APP_PATH" build/Payload/KinogoVOD.app
          cd build
          zip -r KinogoVOD.ipa Payload/
          echo "IPA size: $(du -h KinogoVOD.ipa | cut -f1)"

      - name: Upload IPA as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: KinogoVOD-Unsigned-IPA
          path: build/KinogoVOD.ipa
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Kinogo VOD v1.0 (Build ${{ github.run_number }})"
          body: |
            ## Kinogo VOD iOS IPA (Aesthetic 2026)

            **Как установить через AltStore:**
            1. Скачай `KinogoVOD.ipa` ниже
            2. Открой AltStore на iPhone → "My Apps" → "+" → выбери IPA
            3. Готово!
          files: build/KinogoVOD.ipa
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
